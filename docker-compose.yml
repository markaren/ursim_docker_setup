services:
  ursim:
    build:
      context: .
      dockerfile: Dockerfile.ursim
    environment:
      - ROBOT_MODEL=UR5
    ports:
      - "6080:6080"
    networks:
      ur_net:
        ipv4_address: 172.20.0.2


  ur_driver:
    build:
      context: .
      dockerfile: Dockerfile.ur_driver
    environment:
      - ROBOT_IP=172.20.0.2
      - UR_TYPE=ur5e
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      #- CYCLONEDDS_URI=file:///config/cyclone_dds.xml
    ports:
      - "7400-7600:7400-7600/udp"
    depends_on:
      - ursim
    volumes:
      - ./config/cyclone_dds.xml:/config/cyclone_dds.xml:ro
      - ./entrypoint.sh:/entrypoint.sh:ro
    network_mode: host
    # Needed for real-time scheduling
    privileged: true
    ulimits:
      rtprio: 99
      memlock:
        soft: -1
        hard: -1

networks:
  ur_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16